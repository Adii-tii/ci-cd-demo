<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Demo</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .badge {
            margin-top: 20px;
            padding: 10px 20px;
            background: #00c853;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 CI/CD Pipeline Live</h1>
        <p>Your app has been successfully deployed using Docker, GitHub Actions, and AWS.</p>

        <div class="badge">Deployment Successful</div>

        <div class="footer">
            <p id="time"></p>
        </div>
    </div>

    <script>
        const timeElement = document.getElementById("time");
        const now = new Date();
        timeElement.innerText = "Last updated: " + now.toLocaleString();
    </script>

</body>
</html>
